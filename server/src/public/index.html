<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRMH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
              display: ['Manrope', 'system-ui', 'sans-serif'],
              mono: ['"IBM Plex Mono"', 'ui-monospace', 'monospace'],
            },
            colors: {
              ink: '#08111f',
              slate: '#6b7a90',
              line: '#d6dfeb',
              panel: '#fbfcfe',
              panelStrong: '#f2f6fb',
              accent: '#0f6cfd',
              accentSoft: 'rgba(15, 108, 253, 0.12)',
              emeraldSoft: 'rgba(11, 148, 93, 0.12)',
              amberSoft: 'rgba(181, 111, 28, 0.12)',
              roseSoft: 'rgba(202, 60, 76, 0.12)',
            },
            boxShadow: {
              shell: '0 24px 60px rgba(8, 17, 31, 0.12)',
              soft: '0 14px 35px rgba(8, 17, 31, 0.08)',
            },
            keyframes: {
              'panel-in': {
                '0%': { opacity: '0', transform: 'translateY(10px) scale(0.995)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
            },
            animation: {
              'panel-in': 'panel-in 220ms ease-out',
              shimmer: 'shimmer 1.8s linear infinite',
            },
          },
        },
      };
    </script>
    <style>
      html,
      body,
      #root {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        color: #08111f;
        background:
          radial-gradient(circle at top left, rgba(15, 108, 253, 0.16), transparent 28%),
          radial-gradient(circle at bottom right, rgba(11, 148, 93, 0.12), transparent 26%),
          linear-gradient(180deg, #f5f8fc 0%, #eef3f9 100%);
      }

      * {
        box-sizing: border-box;
      }

      .app-scrollbar {
        scrollbar-width: thin;
        scrollbar-color: rgba(107, 122, 144, 0.42) transparent;
      }

      .app-scrollbar::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      .app-scrollbar::-webkit-scrollbar-thumb {
        border: 2px solid transparent;
        border-radius: 999px;
        background: rgba(107, 122, 144, 0.35);
        background-clip: content-box;
      }

      .app-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }

      .glass {
        backdrop-filter: blur(18px);
      }

      .skeleton {
        background: linear-gradient(
          90deg,
          rgba(214, 223, 235, 0.5) 25%,
          rgba(255, 255, 255, 0.95) 50%,
          rgba(214, 223, 235, 0.5) 75%
        );
        background-size: 200% 100%;
      }

      .cyber-logo {
        background: linear-gradient(120deg, #67e8f9 0%, #60a5fa 32%, #c084fc 62%, #f472b6 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow:
          0 0 18px rgba(96, 165, 250, 0.22),
          0 0 36px rgba(192, 132, 252, 0.16);
      }

      .cyber-frame {
        position: relative;
        overflow: hidden;
      }

      .cyber-frame::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgba(103, 232, 249, 0.12), transparent 30%),
          linear-gradient(315deg, rgba(244, 114, 182, 0.12), transparent 35%);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      const NAV_ITEMS = [
        {
          id: 'api',
          label: 'API Playground',
          title: 'API Playground',
          description: 'Compose, inspect, and replay HTTP requests with developer-friendly controls.',
          helper: 'Send requests through the existing backend proxy.',
        },
        {
          id: 'schema',
          label: 'Schema Generator',
          title: 'Schema Generator',
          description: 'Generate SQL and NoSQL schemas from prompts, source JSON, and model settings.',
          helper: 'AI-powered structure planning for relational and document models.',
        },
        {
          id: 'response',
          label: 'API Response',
          title: 'API Response',
          description: 'Inspect metadata, raw payloads, previews, and JSON views without leaving the workspace.',
          helper: 'Tabs for JSON, raw output, and compact preview.',
        },
        {
          id: 'comparison',
          label: 'Schema Comparison',
          title: 'Schema Comparison',
          description: 'Review SQL and NoSQL architectures side by side in independent scroll regions.',
          helper: 'Built for quick architectural tradeoff reviews.',
        },
        {
          id: 'settings',
          label: 'Settings',
          title: 'Settings',
          description: 'Reserve a stable home for provider defaults, plugins, and workspace preferences.',
          helper: 'Designed for future extensibility.',
        },
      ];

      const METHOD_OPTIONS = ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'HEAD', 'OPTIONS'];
      const RESPONSE_TABS = ['json', 'raw', 'preview'];

      const SHOPIFY_REQUEST_EXAMPLE = {
        method: 'GET',
        url: 'https://demostore.myshopify.com/products.json',
        timeout: 15000,
        headers: {
          Accept: 'application/json',
        },
        params: {
          limit: 3,
          page: 1,
        },
        body: {},
      };

      const initialApiForm = {
        method: 'GET',
        url: '',
        timeout: '15000',
        headers: '{}',
        params: '{}',
        body: '{}',
      };

      const initialSchemaForm = {
        prompt: '',
        provider: '',
        model: '',
        sourceData: '',
      };

      const iconClass = 'h-5 w-5 shrink-0';

      const IconBolt = () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className={iconClass}>
          <path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z" />
        </svg>
      );

      const IconSchema = () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className={iconClass}>
          <rect x="3" y="4" width="7" height="6" rx="1.5" />
          <rect x="14" y="4" width="7" height="6" rx="1.5" />
          <rect x="8.5" y="14" width="7" height="6" rx="1.5" />
          <path d="M10 7h4M12 10v4" />
        </svg>
      );

      const IconResponse = () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className={iconClass}>
          <path d="M8 7h10M8 12h8M8 17h10" />
          <path d="m5 7-2 2 2 2M5 15l-2 2 2 2" />
        </svg>
      );

      const IconCompare = () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className={iconClass}>
          <rect x="3" y="4" width="7" height="16" rx="2" />
          <rect x="14" y="4" width="7" height="16" rx="2" />
          <path d="M10 8h4M10 16h4" />
        </svg>
      );

      const IconSettings = () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className={iconClass}>
          <path d="M12 3v3M12 18v3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M3 12h3M18 12h3M4.9 19.1 7 17M17 7l2.1-2.1" />
          <circle cx="12" cy="12" r="4" />
        </svg>
      );

      const navIcons = {
        api: IconBolt,
        schema: IconSchema,
        response: IconResponse,
        comparison: IconCompare,
        settings: IconSettings,
      };

      const classNames = (...parts) => parts.filter(Boolean).join(' ');

      const formatJson = (value) => {
        if (value === undefined) {
          return '';
        }

        if (typeof value === 'string') {
          return value;
        }

        try {
          return JSON.stringify(value, null, 2);
        } catch (error) {
          return String(value);
        }
      };

      const safeParseJson = (text, label) => {
        const trimmed = String(text || '').trim();

        if (!trimmed) {
          return {};
        }

        try {
          return JSON.parse(trimmed);
        } catch (error) {
          throw new Error(label + ' must be valid JSON.');
        }
      };

      const formatBytes = (bytes) => {
        const size = Number(bytes);

        if (!Number.isFinite(size) || size < 0) {
          return '0 B';
        }

        if (size < 1024) {
          return size + ' B';
        }

        if (size < 1024 * 1024) {
          return (size / 1024).toFixed(1) + ' KB';
        }

        return (size / (1024 * 1024)).toFixed(1) + ' MB';
      };

      const saveSchemaPreviewPayload = (payload) => {
        try {
          window.localStorage.setItem('brmh-schema-preview', JSON.stringify(payload));
          return true;
        } catch (error) {
          console.error('Unable to store schema preview payload.', error);
          return false;
        }
      };

      const inferNoSqlLinks = (collections = []) =>
        collections.flatMap((collection) =>
          (collection.document_shape || [])
            .filter((field) => /(_id|Ids|ids|Ref|ref)$/i.test(field.name || ''))
            .map((field) => ({
              from: collection.name,
              field: field.name,
              to: String(field.references || field.name)
                .replace(/(_id|Ids|ids|Ref|ref)$/i, '')
                .trim() || 'related collection',
            }))
        );

      const getStatusTone = (status) => {
        if (status >= 200 && status < 300) {
          return 'emerald';
        }

        if (status >= 400) {
          return 'rose';
        }

        return 'amber';
      };

      const StatusBadge = ({ label, tone = 'blue' }) => {
        const tones = {
          blue: 'bg-accentSoft text-accent',
          emerald: 'bg-emeraldSoft text-emerald-700',
          amber: 'bg-amberSoft text-amber-700',
          rose: 'bg-roseSoft text-rose-700',
          slate: 'bg-slate-100 text-slate-700',
        };

        return (
          <span className={classNames('inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold', tones[tone])}>
            {label}
          </span>
        );
      };

      const IconFrame = ({ children, active }) => (
        <span
          className={classNames(
            'flex h-10 w-10 items-center justify-center rounded-2xl border transition-all duration-200',
            active
              ? 'border-transparent bg-ink text-white shadow-soft'
              : 'border-line/80 bg-white/80 text-slate hover:border-accent/35 hover:text-ink'
          )}
        >
          {children}
        </span>
      );

      const LogoMark = () => (
        <div className="flex h-11 w-11 items-center justify-center rounded-2xl bg-ink text-white shadow-soft">
          <div className="grid h-6 w-6 grid-cols-2 gap-1">
            <span className="rounded-[5px] bg-white/95"></span>
            <span className="rounded-[5px] bg-accent/80"></span>
            <span className="rounded-[5px] bg-emerald-400"></span>
            <span className="rounded-[5px] bg-white/70"></span>
          </div>
        </div>
      );

      const MiniPreviewVisual = ({ itemId }) => {
        if (itemId === 'api') {
          return (
            <div className="rounded-2xl border border-line/80 bg-white/80 p-3">
              <div className="mb-2 flex gap-2">
                <span className="rounded-full bg-emeraldSoft px-2 py-1 text-[10px] font-semibold text-emerald-700">GET</span>
                <div className="h-6 flex-1 rounded-xl bg-slate-100"></div>
              </div>
              <div className="grid gap-2">
                <div className="h-9 rounded-xl bg-slate-100"></div>
                <div className="h-16 rounded-2xl bg-slate-50"></div>
              </div>
            </div>
          );
        }

        if (itemId === 'schema') {
          return (
            <div className="grid grid-cols-2 gap-2">
              <div className="rounded-2xl border border-line/80 bg-white/80 p-3">
                <div className="mb-2 h-3 w-16 rounded-full bg-accentSoft"></div>
                <div className="space-y-2">
                  <div className="h-8 rounded-xl bg-slate-100"></div>
                  <div className="h-8 rounded-xl bg-slate-50"></div>
                </div>
              </div>
              <div className="rounded-2xl border border-line/80 bg-white/80 p-3">
                <div className="mb-2 h-3 w-16 rounded-full bg-amberSoft"></div>
                <div className="space-y-2">
                  <div className="h-8 rounded-xl bg-slate-100"></div>
                  <div className="h-8 rounded-xl bg-slate-50"></div>
                </div>
              </div>
            </div>
          );
        }

        return (
          <div className="rounded-2xl border border-line/80 bg-white/80 p-3">
            <div className="mb-2 flex gap-2">
              <div className="h-7 w-20 rounded-xl bg-slate-100"></div>
              <div className="h-7 w-16 rounded-xl bg-slate-50"></div>
            </div>
            <div className="space-y-2">
              <div className="h-12 rounded-2xl bg-slate-100"></div>
              <div className="h-8 rounded-xl bg-slate-50"></div>
            </div>
          </div>
        );
      };

      const PreviewTooltip = ({ preview }) => {
        if (!preview) {
          return null;
        }

        const style = {
          top: preview.top,
          left: preview.left,
        };

        return (
          <div
            className="pointer-events-none fixed z-50 hidden w-80 origin-left rounded-3xl border border-white/70 bg-white/88 p-4 shadow-shell ring-1 ring-slate-200/60 glass xl:block"
            style={style}
          >
            <div className="mb-3 flex items-start justify-between gap-3">
              <div>
                <p className="font-display text-base font-extrabold text-ink">{preview.title}</p>
                <p className="mt-1 text-sm leading-6 text-slate">{preview.description}</p>
              </div>
              <StatusBadge label="Preview" tone="blue" />
            </div>
            <MiniPreviewVisual itemId={preview.id} />
            <p className="mt-3 text-xs leading-5 text-slate">{preview.helper}</p>
          </div>
        );
      };

      const Sidebar = ({ activePanel, onSelect }) => {
        const [preview, setPreview] = useState(null);
        const timerRef = useRef(null);

        const hidePreview = () => {
          window.clearTimeout(timerRef.current);
          setPreview(null);
        };

        const showPreview = (item, event) => {
          window.clearTimeout(timerRef.current);
          const rect = event.currentTarget.getBoundingClientRect();

          timerRef.current = window.setTimeout(() => {
            setPreview({
              ...item,
              top: Math.max(20, rect.top - 8),
              left: rect.right + 18,
            });
          }, 200);
        };

        useEffect(() => () => window.clearTimeout(timerRef.current), []);

        return (
          <>
            <aside className="hidden h-full w-[280px] shrink-0 xl:flex xl:flex-col xl:gap-6 xl:border-r xl:border-white/70 xl:bg-white/65 xl:p-5 xl:shadow-soft xl:backdrop-blur-xl">
              <div className="rounded-[28px] border border-white/80 bg-white/80 p-5 shadow-soft">
                <div className="flex items-center gap-3">
                  <LogoMark />
                  <div>
                    <p className="font-display text-2xl font-extrabold tracking-[-0.04em] text-ink">BRMH</p>
                    <p className="text-sm text-slate">AI-Powered API &amp; Schema Engine</p>
                  </div>
                </div>
              </div>

              <nav className="flex min-h-0 flex-1 flex-col gap-2">
                {NAV_ITEMS.map((item) => {
                  const Icon = navIcons[item.id];
                  const active = activePanel === item.id;

                  return (
                    <button
                      key={item.id}
                      type="button"
                      onClick={() => onSelect(item.id)}
                      onMouseEnter={(event) => showPreview(item, event)}
                      onMouseLeave={hidePreview}
                      className={classNames(
                        'group flex items-center gap-3 rounded-[22px] border px-3 py-3 text-left transition-all duration-200',
                        active
                          ? 'border-transparent bg-ink text-white shadow-soft'
                          : 'border-white/60 bg-white/70 text-ink hover:border-accent/25 hover:bg-white'
                      )}
                    >
                      <IconFrame active={active}>
                        <Icon />
                      </IconFrame>
                      <span className="min-w-0">
                        <span className="block truncate text-sm font-semibold">{item.label}</span>
                        <span className={classNames('mt-1 block truncate text-xs', active ? 'text-white/70' : 'text-slate')}>
                          {item.helper}
                        </span>
                      </span>
                    </button>
                  );
                })}
              </nav>

              <div className="rounded-[24px] border border-dashed border-line bg-panelStrong/70 p-4">
                <p className="text-xs font-semibold uppercase tracking-[0.18em] text-slate">Workspace Model</p>
                <p className="mt-2 text-sm leading-6 text-slate">
                  Non-scrolling shell, independently scrollable panels, and a stable surface for future tools.
                </p>
              </div>
            </aside>

            <PreviewTooltip preview={preview} />
          </>
        );
      };

      const MobileRail = ({ activePanel, onSelect }) => (
        <div className="flex gap-2 overflow-x-auto rounded-[24px] border border-white/70 bg-white/70 p-2 shadow-soft app-scrollbar xl:hidden">
          {NAV_ITEMS.map((item) => {
            const Icon = navIcons[item.id];
            const active = activePanel === item.id;

            return (
              <button
                key={item.id}
                type="button"
                onClick={() => onSelect(item.id)}
                className={classNames(
                  'flex min-w-max items-center gap-2 rounded-2xl px-3 py-2 text-sm transition-colors',
                  active ? 'bg-ink text-white' : 'bg-white text-ink'
                )}
              >
                <Icon />
                <span>{item.label}</span>
              </button>
            );
          })}
        </div>
      );

      const PanelContainer = ({ eyebrow, title, description, actions, children }) => (
        <section className="flex h-full min-h-0 flex-col overflow-hidden rounded-[30px] border border-white/80 bg-white/78 shadow-shell glass">
          <header className="sticky top-0 z-20 border-b border-line/80 bg-white/88 px-5 py-4 backdrop-blur-xl">
            <div className="flex flex-wrap items-start justify-between gap-4">
              <div>
                <p className="text-[11px] font-semibold uppercase tracking-[0.22em] text-slate">{eyebrow}</p>
                <h1 className="mt-2 font-display text-[28px] font-extrabold tracking-[-0.04em] text-ink">{title}</h1>
                <p className="mt-2 max-w-3xl text-sm leading-6 text-slate">{description}</p>
              </div>
              {actions ? <div className="flex items-center gap-2">{actions}</div> : null}
            </div>
          </header>
          <div className="min-h-0 flex-1 p-4">{children}</div>
        </section>
      );

      const ScrollableSection = ({ title, description, actions, children, className = '' }) => (
        <section className={classNames('flex min-h-0 flex-col overflow-hidden rounded-[26px] border border-line/80 bg-panel', className)}>
          <div className="sticky top-0 z-10 border-b border-line/70 bg-panel/95 px-4 py-4 backdrop-blur">
            <div className="flex flex-wrap items-start justify-between gap-3">
              <div>
                <h2 className="font-display text-lg font-extrabold tracking-[-0.03em] text-ink">{title}</h2>
                {description ? <p className="mt-1 text-sm leading-6 text-slate">{description}</p> : null}
              </div>
              {actions ? <div className="flex items-center gap-2">{actions}</div> : null}
            </div>
          </div>
          <div className="app-scrollbar min-h-0 flex-1 overflow-y-auto p-4">{children}</div>
        </section>
      );

      const InputField = ({ label, children, hint, labelClassName = 'text-ink', hintClassName = 'text-slate' }) => (
        <label className="grid gap-2">
          <span className={classNames('text-sm font-semibold', labelClassName)}>{label}</span>
          {children}
          {hint ? <span className={classNames('text-xs leading-5', hintClassName)}>{hint}</span> : null}
        </label>
      );

      const fieldClassName =
        'w-full rounded-2xl border border-line bg-white px-4 py-3 text-sm text-ink outline-none transition focus:border-accent focus:ring-4 focus:ring-accentSoft';

      const ToolbarButton = ({ children, tone = 'secondary', ...props }) => {
        const tones = {
          primary: 'bg-ink text-white hover:bg-slate-900',
          secondary: 'bg-white text-ink border border-line hover:border-accent/30 hover:text-accent',
          ghost: 'bg-panelStrong text-slate hover:text-ink',
        };

        return (
          <button
            {...props}
            className={classNames(
              'rounded-2xl px-4 py-2.5 text-sm font-semibold transition-all duration-200 disabled:cursor-wait disabled:opacity-60',
              tones[tone],
              props.className
            )}
          >
            {children}
          </button>
        );
      };

      const EmptyState = ({ title, copy }) => (
        <div className="flex h-full min-h-[220px] flex-col items-center justify-center rounded-[24px] border border-dashed border-line bg-panelStrong/70 px-6 text-center">
          <div className="mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-white shadow-soft">
            <IconResponse />
          </div>
          <h3 className="font-display text-xl font-extrabold tracking-[-0.03em] text-ink">{title}</h3>
          <p className="mt-2 max-w-md text-sm leading-6 text-slate">{copy}</p>
        </div>
      );

      const LoadingSkeleton = ({ lines = 6 }) => (
        <div className="space-y-3">
          {Array.from({ length: lines }).map((_, index) => (
            <div
              key={index}
              className={classNames(
                'skeleton animate-shimmer rounded-2xl',
                index === 0 ? 'h-12 w-1/3' : index === lines - 1 ? 'h-24 w-full' : 'h-10 w-full'
              )}
            ></div>
          ))}
        </div>
      );

      const AlertBox = ({ title, copy }) => (
        <div className="rounded-[22px] border border-rose-200 bg-rose-50 px-4 py-4 text-rose-800">
          <p className="font-semibold">{title}</p>
          <p className="mt-1 text-sm leading-6">{copy}</p>
        </div>
      );

      const KeyMetric = ({ label, value, tone = 'slate' }) => (
        <div className="rounded-[22px] border border-line bg-white p-4 shadow-sm">
          <p className="text-xs font-semibold uppercase tracking-[0.16em] text-slate">{label}</p>
          <div className="mt-3 flex items-center gap-2">
            <p className="font-display text-2xl font-extrabold tracking-[-0.04em] text-ink">{value}</p>
            {tone !== 'slate' ? (
              <StatusBadge
                label={
                  tone === 'success'
                    ? 'Healthy'
                    : tone === 'emerald'
                      ? 'Success'
                      : tone === 'rose'
                        ? 'Error'
                        : tone === 'amber'
                          ? 'Pending'
                          : tone
                }
                tone={tone === 'success' ? 'emerald' : tone}
              />
            ) : null}
          </div>
        </div>
      );

      const CodeBlock = ({ value }) => (
        <pre className="overflow-x-auto rounded-[22px] bg-[#0a1220] p-4 font-mono text-xs leading-6 text-slate-100 app-scrollbar">
          {value}
        </pre>
      );

      const ResponseViewer = ({ result, loading, activeTab, onTabChange }) => {
        const tabs = {
          json: result

            </div>

            <div className="app-scrollbar min-h-0 flex-1 space-y-4 overflow-y-auto p-4">
              <div className="rounded-[24px] border border-line bg-panelStrong/70 p-4">
                <p className="text-xs font-semibold uppercase tracking-[0.16em] text-slate">Active Tool</p>
                <h3 className="mt-2 font-display text-xl font-extrabold tracking-[-0.03em] text-ink">{activeItem?.label}</h3>
                <p className="mt-2 text-sm leading-6 text-slate">{activeItem?.helper}</p>
              </div>

              <div className="rounded-[24px] border border-line bg-white p-4">
                <p className="text-xs font-semibold uppercase tracking-[0.16em] text-slate">Quick Switch</p>
                <div className="mt-3 flex flex-wrap gap-2">
                  {['api', 'response', 'schema', 'comparison'].map((panelId) => (
                    <ToolbarButton key={panelId} type="button" tone="secondary" onClick={() => onOpenPanel(panelId)}>
                      {NAV_ITEMS.find((item) => item.id === panelId)?.label}
                    </ToolbarButton>
                  ))}
                </div>
              </div>

              <div className="grid gap-3">
                <KeyMetric
                  label="API State"
                  value={requestLoading ? 'Loading' : requestResult ? (requestResult.success ? 'Ready' : 'Error') : 'Idle'}
                  tone={requestLoading ? 'amber' : requestResult ? (requestResult.success ? 'success' : 'rose') : 'slate'}
                />
                <KeyMetric
                  label="Schema State"
                  value={schemaLoading ? 'Generating' : schemaResult ? 'Ready' : 'Idle'}
                  tone={schemaLoading ? 'amber' : schemaResult ? 'success' : 'slate'}
                />
              </div>

              <SchemaDockPanel
                schemaForm={schemaForm}
                onChange={onSchemaChange}
                onSubmit={onSchemaSubmit}
                onLoadExample={onSchemaExample}
                onClear={onSchemaClear}
                loading={schemaLoading}
                errorMessage={schemaError}
                result={schemaResult}
                onOpenPreview={onOpenSchemaPreview}
              />

              <div className="rounded-[24px] border border-line bg-white p-4">
                <p className="text-xs font-semibold uppercase tracking-[0.16em] text-slate">Latest Response Summary</p>
                {requestResult ? (
                  <div className="mt-3 space-y-3">
                    <div className="flex items-center justify-between">
                      <span className="text-sm text-slate">Status</span>
                      <StatusBadge
                        label={String(requestResult.success ? requestResult.response?.status : requestResult.error?.status || 'N/A')}
                        tone={getStatusTone(requestResult.success ? requestResult.response?.status : requestResult.error?.status)}
                      />
                    </div>
                    <div className="flex items-center justify-between">
                      <span className="text-sm text-slate">Duration</span>
                      <span className="text-sm font-semibold text-ink">
                        {String(requestResult.success ? requestResult.response?.meta?.durationMs : requestResult.error?.meta?.durationMs || 0)} ms
                      </span>
                    </div>
                    <CodeBlock value={(requestResult.success ? requestResult.response?.preview : requestResult.error?.preview) || '(empty)'} />
                  </div>
                ) : (
                  <p className="mt-3 text-sm leading-6 text-slate">No request has been sent yet.</p>
                )}
              </div>
            </div>
          </section>
        );
      };

      const App = () => {
        const [activePanel, setActivePanel] = useState('schema');
        const [inspectorOpen, setInspectorOpen] = useState(true);
        const [apiForm, setApiForm] = useState(initialApiForm);
        const [schemaForm, setSchemaForm] = useState(initialSchemaForm);
        const [requestResult, setRequestResult] = useState(null);
        const [schemaResult, setSchemaResult] = useState(null);
        const [requestLoading, setRequestLoading] = useState(false);
        const [schemaLoading, setSchemaLoading] = useState(false);
        const [requestError, setRequestError] = useState('');
        const [schemaError, setSchemaError] = useState('');
        const [responseTab, setResponseTab] = useState('json');

        const updateApiField = (key, value) => {
          setApiForm((current) => ({ ...current, [key]: value }));
        };

        const updateSchemaField = (key, value) => {
          setSchemaForm((current) => ({ ...current, [key]: value }));
        };

        const clearRequest = () => {
          setApiForm(initialApiForm);
          setRequestResult(null);
          setRequestError('');
        };

        const clearSchema = () => {
          setSchemaForm(initialSchemaForm);
          setSchemaResult(null);
          setSchemaError('');
        };

        const openSchemaPreview = () => {
          if (!schemaResult) {
            return;
          }

          const stored = saveSchemaPreviewPayload({
            schemaResult,
            schemaForm,
            savedAt: new Date().toISOString(),
          });

          if (!stored) {
            setSchemaError('Unable to open the visual schema preview because local storage is unavailable.');
            return;
          }

          window.open('/studio/', '_blank', 'noopener,noreferrer');
        };

        const loadShopifyExample = () => {
          setApiForm({
            method: SHOPIFY_REQUEST_EXAMPLE.method,
            url: SHOPIFY_REQUEST_EXAMPLE.url,
            timeout: String(SHOPIFY_REQUEST_EXAMPLE.timeout),
            headers: formatJson(SHOPIFY_REQUEST_EXAMPLE.headers),
            params: formatJson(SHOPIFY_REQUEST_EXAMPLE.params),
            body: formatJson(SHOPIFY_REQUEST_EXAMPLE.body),
          });
          setRequestError('');
        };

        const loadSchemaExample = async () => {
          setSchemaLoading(true);
          setSchemaError('');

          try {
            const response = await fetch('/api/schema/example');
            const result = await response.json();

            if (!response.ok || !result.success || !result.example) {
              throw new Error(result.error?.message || 'Unable to load a schema example.');
            }

            setSchemaForm({
              prompt: result.example.prompt || '',
              provider: result.example.provider || '',
              model: result.example.model || '',
              sourceData: result.example.sourceData ? formatJson(result.example.sourceData) : '',
            });
            setActivePanel('schema');
          } catch (error) {
            setSchemaError(error.message || 'Unable to load a schema example.');
          } finally {
            setSchemaLoading(false);
          }
        };

        const submitRequest = async (event) => {
          event.preventDefault();
          setRequestLoading(true);
          setRequestError('');

          try {
            const payload = {
              method: apiForm.method,
              url: apiForm.url.trim(),
              timeout: Number(apiForm.timeout) || 15000,
              headers: safeParseJson(apiForm.headers, 'Headers JSON'),
              params: safeParseJson(apiForm.params, 'Query Params JSON'),
              body: safeParseJson(apiForm.body, 'Body JSON'),
            };

            const response = await fetch('/api/requests/send', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            const result = await response.json();

            setRequestResult(result);
            setResponseTab(result.success ? 'json' : 'preview');
            setActivePanel('response');
          } catch (error) {
            setRequestError(error.message || 'Unable to send the request.');
            setRequestResult(null);
          } finally {
            setRequestLoading(false);
          }
        };

        const submitSchema = async (event) => {
          event.preventDefault();
          setSchemaLoading(true);
          setSchemaError('');

          try {
            const payload = {
              prompt: schemaForm.prompt.trim(),
              provider: schemaForm.provider.trim() || undefined,
              model: schemaForm.model.trim() || undefined,
              sourceData: schemaForm.sourceData.trim()
                ? safeParseJson(schemaForm.sourceData, 'Source JSON')
                : undefined,
            };

            const response = await fetch('/api/schema/generate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            const result = await response.json();

            if (!response.ok || !result.success) {
              throw new Error(result.error?.message || 'Schema generation failed.');
            }

            setSchemaResult(result);
            setActivePanel('schema');
          } catch (error) {
            setSchemaError(error.message || 'Schema generation failed.');
          } finally {
            setSchemaLoading(false);
          }
        };

        const panelMap = useMemo(
          () => ({
            api: (
              <APIPlaygroundPanel
                formState={apiForm}
                onChange={updateApiField}
                onSubmit={submitRequest}
                onLoadExample={loadShopifyExample}
                onClear={clearRequest}
                loading={requestLoading}
                localError={requestError}
                requestResult={requestResult}
                requestLoading={requestLoading}
                responseTab={responseTab}
                onResponseTabChange={setResponseTab}
              />
            ),
            schema: (
              <BrandCanvasPanel
                title="BRMH"
                subtitle="The schema generator is docked on the right, leaving the center canvas open for brand presence and future interactive previews."
              />
            ),
            response: (
              <ResponsePanel
                requestResult={requestResult}
                requestLoading={requestLoading}
                responseTab={responseTab}
                onResponseTabChange={setResponseTab}
              />
            ),
            comparison: <BrandCanvasPanel title="BRMH" subtitle="Schema review has been moved to the right dock preview so the central workspace stays visually clear for now." />,
            settings: <SettingsPanel />,
          }),
          [
            apiForm,
            requestError,
            requestLoading,
            requestResult,
            responseTab,
            schemaError,
            schemaForm,
            schemaLoading,
            schemaResult,
          ]
        );

        return (
          <div className="flex h-full overflow-hidden">
            <Sidebar activePanel={activePanel} onSelect={setActivePanel} />

            <main className="flex min-w-0 flex-1 flex-col gap-4 p-4 xl:p-5">
              <MobileRail activePanel={activePanel} onSelect={setActivePanel} />

              <div className={classNames('grid min-h-0 flex-1 gap-4', inspectorOpen ? 'xl:grid-cols-[minmax(0,1fr)_360px]' : 'grid-cols-1')}>
                <div className="min-h-0 animate-panel-in">{panelMap[activePanel]}</div>

                {inspectorOpen ? (
                  <div className="hidden min-h-0 xl:block">
                    <InspectorPanel
                      activePanel={activePanel}
                      requestResult={requestResult}
                      requestLoading={requestLoading}
                      schemaResult={schemaResult}
                      schemaLoading={schemaLoading}
                      onOpenPanel={setActivePanel}
                      schemaForm={schemaForm}
                      onSchemaChange={updateSchemaField}
                      onSchemaSubmit={submitSchema}
                      onSchemaExample={loadSchemaExample}
                      onSchemaClear={clearSchema}
                      schemaError={schemaError}
                      onOpenSchemaPreview={openSchemaPreview}
                    />
                  </div>
                ) : null}
              </div>

              <button
                type="button"
                onClick={() => setInspectorOpen((current) => !current)}
                className="hidden self-end rounded-2xl border border-white/70 bg-white/70 px-4 py-2 text-sm font-semibold text-ink shadow-soft xl:inline-flex"
              >
                {inspectorOpen ? 'Hide Insights Panel' : 'Show Insights Panel'}
              </button>
            </main>
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
