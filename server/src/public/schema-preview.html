<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRMH Schema Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=SF+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body, #root { height: 100%; margin: 0; overflow: hidden; }
      body {
        background:
          radial-gradient(circle at top left, rgba(96, 165, 250, 0.22), transparent 28%),
          radial-gradient(circle at bottom right, rgba(244, 114, 182, 0.16), transparent 24%),
          linear-gradient(180deg, #f7f9fc 0%, #eef3f8 100%);
        font-family: Manrope, system-ui, sans-serif;
        color: #0f172a;
      }
      .glass { backdrop-filter: blur(22px); }
      .scrollbar { scrollbar-width: thin; scrollbar-color: rgba(100,116,139,.35) transparent; }
      .scrollbar::-webkit-scrollbar { width: 10px; height: 10px; }
      .scrollbar::-webkit-scrollbar-thumb { background: rgba(100,116,139,.35); border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;
      const STORAGE_KEY = 'brmh-schema-preview';
      const NODE_W = 260;
      const NODE_H = 170;

      const formatJson = (value) => {
        try { return JSON.stringify(value, null, 2); } catch { return String(value); }
      };
      const inferNoSqlLinks = (collections = []) =>
        collections.flatMap((collection) =>
          (collection.document_shape || [])
            .filter((field) => /(_id|Ids|ids|Ref|ref)$/i.test(field.name || ''))
            .map((field) => ({
              from: collection.name,
              to: String(field.references || field.name).replace(/(_id|Ids|ids|Ref|ref)$/i, '').trim() || 'related',
              label: field.name,
            }))
        );
      const readPayload = () => {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch { return null; }
      };
      const savePayload = (payload) => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); return true; } catch { return false; }
      };
      const cloneValue = (value) => JSON.parse(JSON.stringify(value));
      const buildVisualState = (payload) => {
        const architectures = payload?.schemaResult?.schema?.architectures || [];
        const buildNodes = (items, isSql) =>
          items.map((item, index) => ({
            id: item.name,
            name: item.name,
            description: item.description || (isSql ? 'SQL table' : 'NoSQL collection'),
            fields: (isSql ? item.columns : item.document_shape || []).slice(0, 8),
            x: 48 + (index % 2) * 340,
            y: 48 + Math.floor(index / 2) * 230,
          }));
        const sql = architectures.find((item) => item.database_type === 'sql');
        const nosql = architectures.find((item) => item.database_type === 'nosql');
        const sqlNodes = buildNodes(sql?.tables || [], true);
        const nosqlNodes = buildNodes(nosql?.collections || [], false);
        const sqlConnections = (sql?.tables || []).flatMap((table) =>
          (table.columns || [])
            .filter((column) => column.foreign_key)
            .map((column, index) => ({
              id: table.name + '-' + index,
              fromId: table.name,
              toId: String(column.foreign_key || '').split('.')[0] || table.name,
              label: column.name,
            }))
        );
        const nosqlConnections = inferNoSqlLinks(nosql?.collections || []).map((link, index) => ({
          id: link.from + '-' + index,
          fromId: link.from,
          toId: link.to,
          label: link.label,
        }));
        return {
          sql: { architecture: sql, nodes: sqlNodes, connections: sqlConnections },
          nosql: { architecture: nosql, nodes: nosqlNodes, connections: nosqlConnections },
        };
      };
      const portPoint = (node, side) => ({ x: node.x + (side === 'right' ? NODE_W : 0), y: node.y + 58 });
      const pathFor = (from, to) => {
        const dx = Math.max(80, Math.abs(to.x - from.x) * 0.45);
        return `M ${from.x} ${from.y} C ${from.x + dx} ${from.y}, ${to.x - dx} ${to.y}, ${to.x} ${to.y}`;
      };

      function App() {
        const [payload, setPayload] = useState(readPayload());
        const [mode, setMode] = useState('sql');
        const [editor, setEditor] = useState(() => buildVisualState(readPayload()));
        const [selectedNodeId, setSelectedNodeId] = useState(null);
        const [drawerOpen, setDrawerOpen] = useState(false);
        const [editPrompt, setEditPrompt] = useState('');
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState('');
        const [dragging, setDragging] = useState(null);
        const [tempConnection, setTempConnection] = useState(null);
        const canvasRef = useRef(null);

        useEffect(() => {
          setEditor(buildVisualState(payload));
          const architectures = payload?.schemaResult?.schema?.architectures || [];
          if (!architectures.find((item) => item.database_type === mode)) {
            setMode(architectures[0]?.database_type || 'sql');
          }
        }, [payload]);

        useEffect(() => {
          const move = (event) => {
            if (dragging) {
              setEditor((current) => {
                const next = cloneValue(current);
                const node = next[mode].nodes.find((item) => item.id === dragging.nodeId);
                if (!node) return current;
                node.x = Math.max(24, dragging.startX + event.clientX - dragging.originX);
                node.y = Math.max(24, dragging.startY + event.clientY - dragging.originY);
                return next;
              });
            }
            if (tempConnection && canvasRef.current) {
              const rect = canvasRef.current.getBoundingClientRect();
              setTempConnection((current) => current ? { ...current, cursorX: event.clientX - rect.left, cursorY: event.clientY - rect.top } : current);
            }
          };
          const up = () => setDragging(null);
          window.addEventListener('pointermove', move);
          window.addEventListener('pointerup', up);
          return () => {
            window.removeEventListener('pointermove', move);
            window.removeEventListener('pointerup', up);
          };
        }, [dragging, tempConnection, mode]);

        const active = editor[mode] || { nodes: [], connections: [], architecture: null };
        const selectedNode = active.nodes.find((item) => item.id === selectedNodeId) || active.nodes[0] || null;

        const openPreviewPayload = payload?.schemaResult;
        const beginConnection = (nodeId) => {
          const node = active.nodes.find((item) => item.id === nodeId);
          if (!node) return;
          const start = portPoint(node, 'right');
          setTempConnection({ fromId: nodeId, cursorX: start.x + 120, cursorY: start.y });
        };
        const finishConnection = (targetId) => {
          if (!tempConnection || tempConnection.fromId === targetId) return setTempConnection(null);
          setEditor((current) => {
            const next = cloneValue(current);
            next[mode].connections.push({
              id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
              fromId: tempConnection.fromId,
              toId: targetId,
              label: 'manual link',
            });
            return next;
          });
          setTempConnection(null);
        };

        const regenerateSchema = async () => {
          if (!editPrompt.trim() || !payload?.schemaForm?.prompt) return;
          setLoading(true);
          setError('');
          try {
            const response = await fetch('/api/schema/generate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                prompt: `${payload.schemaForm.prompt}\n\nRefine the existing schema with these requested changes:\n${editPrompt}`,
                provider: payload.schemaForm.provider || undefined,
                model: payload.schemaForm.model || undefined,
                sourceData: payload.schemaResult?.schema || undefined,
              }),
            });
            const result = await response.json();
            if (!response.ok || !result.success) throw new Error(result.error?.message || 'Unable to refine schema.');
            const nextPayload = {
              ...payload,
              schemaResult: result,
              schemaForm: { ...payload.schemaForm, prompt: payload.schemaForm.prompt + '\n\nRefinement: ' + editPrompt.trim() },
            };
            setPayload(nextPayload);
            savePayload(nextPayload);
            setEditPrompt('');
            setDrawerOpen(false);
          } catch (err) {
            setError(err.message || 'Unable to refine schema.');
          } finally {
            setLoading(false);
          }
        };

        if (!payload?.schemaResult) {
          return (
            <div className="flex h-full items-center justify-center p-8">
              <div className="glass rounded-[32px] border border-white/80 bg-white/75 p-10 text-center shadow-2xl">
                <h1 className="text-4xl font-extrabold tracking-[-0.04em]">BRMH Schema Preview</h1>
                <p className="mt-4 max-w-xl text-sm leading-7 text-slate-600">No generated schema is available yet. Return to the dashboard, generate a schema, then open Preview Schema again.</p>
              </div>
            </div>
          );
        }

        return (
          <div className="flex h-full gap-4 p-4">
            <section className="glass flex min-w-0 flex-1 flex-col overflow-hidden rounded-[32px] border border-white/80 bg-white/72 shadow-2xl">
              <header className="border-b border-slate-200/70 px-6 py-5">
                <div className="flex flex-wrap items-center justify-between gap-4">
                  <div>
                    <p className="text-xs font-semibold uppercase tracking-[0.24em] text-slate-500">Visual Schema Studio</p>
                    <h1 className="mt-2 text-4xl font-extrabold tracking-[-0.05em]">BRMH</h1>
                    <p className="mt-2 text-sm text-slate-500">Apple-like schema canvas with draggable cards, wire connections, and a prompt-based refinement drawer.</p>
                  </div>
                  <div className="inline-flex rounded-full bg-slate-100 p-1">
                    {['sql', 'nosql'].map((item) => (
                      <button key={item} onClick={() => setMode(item)} className={item === mode ? 'rounded-full bg-white px-4 py-2 text-sm font-bold shadow-sm' : 'rounded-full px-4 py-2 text-sm text-slate-500'}>
                        {item.toUpperCase()}
                      </button>
                    ))}
                  </div>
                </div>
              </header>

              <div ref={canvasRef} className="relative min-h-0 flex-1 overflow-auto scrollbar bg-[linear-gradient(rgba(148,163,184,.12)_1px,transparent_1px),linear-gradient(90deg,rgba(148,163,184,.12)_1px,transparent_1px)] bg-[size:32px_32px]">
                <svg className="pointer-events-none absolute inset-0 h-full w-full">
                  {active.connections.map((connection) => {
                    const from = active.nodes.find((item) => item.id === connection.fromId);
                    const to = active.nodes.find((item) => item.id === connection.toId);
                    if (!from || !to) return null;
                    return <path key={connection.id} d={pathFor(portPoint(from, 'right'), portPoint(to, 'left'))} fill="none" stroke={mode === 'sql' ? '#3b82f6' : '#f59e0b'} strokeWidth="3" strokeLinecap="round" />;
                  })}
                  {tempConnection ? (() => {
                    const from = active.nodes.find((item) => item.id === tempConnection.fromId);
                    if (!from) return null;
                    return <path d={pathFor(portPoint(from, 'right'), { x: tempConnection.cursorX, y: tempConnection.cursorY })} fill="none" stroke="#ec4899" strokeWidth="3" strokeDasharray="8 8" />;
                  })() : null}
                </svg>

                {active.nodes.map((node) => (
                  <article
                    key={node.id}
                    className={selectedNodeId === node.id ? 'absolute rounded-[28px] border border-sky-300 bg-white p-4 shadow-2xl ring-4 ring-sky-100' : 'absolute rounded-[28px] border border-white/90 bg-white/96 p-4 shadow-xl'}
                    style={{ left: node.x, top: node.y, width: NODE_W, minHeight: NODE_H }}
                    onClick={() => setSelectedNodeId(node.id)}
                  >
                    <div className="mb-3 flex items-start justify-between gap-3 cursor-grab" onPointerDown={(event) => setDragging({ nodeId: node.id, originX: event.clientX, originY: event.clientY, startX: node.x, startY: node.y })}>
                      <div>
                        <p className="text-xs font-semibold uppercase tracking-[0.2em] text-slate-400">{mode === 'sql' ? 'Table' : 'Collection'}</p>
                        <h3 className="mt-1 text-lg font-extrabold tracking-[-0.03em]">{node.name}</h3>
                      </div>
                      <span className="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-500">{node.fields.length} fields</span>
                    </div>
                    <p className="text-sm leading-6 text-slate-500">{node.description}</p>
                    <div className="mt-4 space-y-2">
                      {node.fields.map((field, index) => <div key={index} className="rounded-2xl bg-slate-50 px-3 py-2 text-sm text-slate-700">{field.name}</div>)}
                    </div>
                    <button onClick={(event) => { event.stopPropagation(); beginConnection(node.id); }} className="absolute -right-3 top-12 flex h-6 w-6 items-center justify-center rounded-full bg-sky-500 text-white shadow-lg">+</button>
                    <button onClick={(event) => { event.stopPropagation(); finishConnection(node.id); }} className="absolute -left-3 top-12 flex h-6 w-6 items-center justify-center rounded-full bg-amber-500 text-white shadow-lg">+</button>
                  </article>
                ))}
              </div>
            </section>

            <aside className="glass flex w-[360px] shrink-0 flex-col overflow-hidden rounded-[32px] border border-white/80 bg-white/76 shadow-2xl">
              <div className="border-b border-slate-200/70 px-5 py-5">
                <p className="text-xs font-semibold uppercase tracking-[0.22em] text-slate-500">Inspector</p>
                <h2 className="mt-2 text-2xl font-extrabold tracking-[-0.04em]">Schema Controls</h2>
              </div>
              <div className="scrollbar min-h-0 flex-1 space-y-4 overflow-y-auto p-5">
                <div className="rounded-[24px] bg-slate-50 p-4">
                  <p className="text-xs font-semibold uppercase tracking-[0.16em] text-slate-500">{mode.toUpperCase()} Summary</p>
                  <p className="mt-2 text-sm text-slate-600">{active.architecture?.use_case || 'No summary available.'}</p>
                  <div className="mt-3 grid grid-cols-2 gap-3">
                    <div className="rounded-2xl bg-white p-3"><p className="text-xs text-slate-400">Blocks</p><p className="mt-1 text-2xl font-extrabold">{active.nodes.length}</p></div>
                    <div className="rounded-2xl bg-white p-3"><p className="text-xs text-slate-400">Wires</p><p className="mt-1 text-2xl font-extrabold">{active.connections.length}</p></div>
                  </div>
                </div>

                <div className="rounded-[24px] bg-slate-50 p-4">
                  <div className="flex items-center justify-between gap-3">
                    <div>
                      <p className="text-xs font-semibold uppercase tracking-[0.16em] text-slate-500">Refine Schema</p>
                      <p className="mt-1 text-sm text-slate-600">Open a separate prompt drawer for schema changes.</p>
                    </div>
                    <button onClick={() => setDrawerOpen(true)} className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white">Edit</button>
                  </div>
                </div>

                <div className="rounded-[24px] bg-slate-50 p-4">
                  <p className="text-xs font-semibold uppercase tracking-[0.16em] text-slate-500">Selected Block</p>
                  {selectedNode ? (
                    <div className="mt-3 space-y-2">
                      <p className="text-lg font-extrabold">{selectedNode.name}</p>
                      <p className="text-sm text-slate-600">{selectedNode.description}</p>
                      {selectedNode.fields.map((field, index) => <div key={index} className="rounded-2xl bg-white px-3 py-2 text-sm">{field.name}</div>)}
                    </div>
                  ) : <p className="mt-3 text-sm text-slate-500">Select a block on the canvas to inspect it here.</p>}
                </div>

                <div className="rounded-[24px] bg-slate-50 p-4">
                  <p className="text-xs font-semibold uppercase tracking-[0.16em] text-slate-500">Schema Payload</p>
                  <pre className="scrollbar mt-3 max-h-64 overflow-auto rounded-2xl bg-[#0f172a] p-3 text-[11px] leading-6 text-slate-100">{formatJson(openPreviewPayload.meta || {})}</pre>
                </div>
              </div>
            </aside>

            {drawerOpen ? (
              <div className="absolute inset-0 z-50 flex justify-end bg-slate-950/35">
                <div className="glass flex h-full w-[460px] flex-col border-l border-white/80 bg-white/86 p-6 shadow-2xl">
                  <div className="flex items-start justify-between gap-3">
                    <div>
                      <p className="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Prompt Refinement</p>
                      <h3 className="mt-2 text-3xl font-extrabold tracking-[-0.04em]">Edit Schema</h3>
                      <p className="mt-2 text-sm text-slate-600">Describe the changes you want, then BRMH regenerates the schema in this visual studio.</p>
                    </div>
                    <button onClick={() => setDrawerOpen(false)} className="rounded-2xl bg-slate-100 px-4 py-2 text-sm font-semibold">Close</button>
                  </div>
                  <div className="mt-6 grid gap-4">
                    <textarea value={editPrompt} onChange={(event) => setEditPrompt(event.target.value)} placeholder="Example: add an invoices table linked to organizations, split task comments into a separate audit stream, and keep a denormalized NoSQL feed." className="min-h-[220px] w-full rounded-[28px] border border-slate-200 bg-white px-4 py-4 text-sm outline-none focus:border-sky-300 focus:ring-4 focus:ring-sky-100"></textarea>
                    {error ? <div className="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">{error}</div> : null}
                    <button onClick={regenerateSchema} disabled={loading || !editPrompt.trim()} className="rounded-[24px] bg-slate-900 px-4 py-3 text-sm font-semibold text-white disabled:opacity-60">
                      {loading ? 'Regenerating...' : 'Apply Changes'}
                    </button>
                  </div>
                </div>
              </div>
            ) : null}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
